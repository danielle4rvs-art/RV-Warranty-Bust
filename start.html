function deadlineWarn(d) {
  if (!d) return null;
  const m = d.toLowerCase();
  let days = null;
  if (m.includes("today") || m.includes("just")) days = 1;
  else if (m.includes("yesterday")) days = 2;
  else if (m.includes("week")) { days = (parseInt(m) || 1) * 7; }
  else if (m.includes("month")) { days = (parseInt(m) || 1) * 30; }
  else { const p = Date.parse(d); if (!isNaN(p)) days = Math.floor((Date.now() - p) / 864e5); }
  if (days === null) return { urgent: false, text: "Check your contract for appeal deadlines. Most give you 30 to 180 days from the denial date to file a formal appeal." };
  if (days > 150) return { urgent: true, text: `It's been about ${days} days since your denial. Your contract likely gives you 30 to 180 days to file a formal appeal. Check your contract for the exact deadline and act today.` };
  if (days > 90) return { urgent: true, text: `It's been about ${days} days since your denial. Some appeal windows are as short as 90 days. Check your contract and don't wait.` };
  if (days > 30) return { urgent: false, text: `It's been about ${days} days since your denial. Your contract likely gives you 30 to 180 days to file a formal appeal. You still have time, but the sooner you send your letter the stronger your position.` };
  return { urgent: false, text: "Good timing. Your appeal window is wide open. Let's get this going." };
}

function vinCheck(v) {
  if (!v) return null;
  const c = v.replace(/[^a-zA-Z0-9]/g, "");
  if (/[IOQ]/i.test(c)) return { ok: false, msg: "VINs don't contain I, O, or Q" };
  if (c.length > 0 && c.length < 17) return { ok: false, msg: `${c.length} of 17 characters` };
  if (c.length > 17) return { ok: false, msg: "Too many characters. VINs are exactly 17." };
  if (c.length === 17) return { ok: true, msg: "17 characters. Looks right." };
  return null;
}

function fmtDate(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  if (!y || !m || !d) return iso;
  return `${m}/${d}/${y}`;
}

  if (d.company === "Dealer-Sold Warranty") return (d.dealerCompany && d.dealerCompany !== "UNKNOWN") ? d.dealerCompany : "";
  return d.company || "your warranty company";
}

function M(val, placeholder) { return val && val.trim() ? val : `%%${placeholder}%%`; }

function genAppealLetter(d) {
  const today = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  const co = coName(d) || "";
  const cn = M(d.contractNum, "YOUR CONTRACT NUMBER");
  const cl = M(d.claimNum, "YOUR CLAIM NUMBER");
  const vin = M(d.vin, "YOUR VIN");
  const dd = M(d.deniedDate, "DATE OF DENIAL");
  const addr = M(d.address, "YOUR ADDRESS");
  const ph = M(d.phone, "YOUR PHONE");
  const em = M(d.email, "YOUR EMAIL");
  const rv = d.rvYear ? `${d.rvYear} ${d.rvMake || ""} ${d.rvModel || ""}`.trim() : "";
  const wb = d.whatBroke || "";
  const isCali = d.state === "California";

  const denialArgs = {
    wear: `Your company has denied this claim citing "normal wear and tear." I am challenging this determination for the following reasons:

First, under the terms of my service contract, a denial based on wear and tear requires your company to provide credible, documented evidence that the failure was caused by gradual deterioration rather than a sudden mechanical breakdown. A general assumption or opinion that a component "must have" worn out over time does not meet this standard.

Second, the specific failure involved is as follows: ${wb || "[description of failure]"}. This was a mechanical breakdown that occurred during the active coverage period of my contract. The repair facility's diagnostic report confirms this was not cosmetic deterioration but a functional failure of the component.

Third, I am requesting your company provide the specific technical inspection findings, testing data, or expert analysis that supports a wear-and-tear determination. If no such documentation exists, this denial has no evidentiary basis and must be reversed.`,

    preexisting: `Your company has denied this claim citing a "pre-existing condition." I am challenging this determination for the following reasons:

First, under both my service contract and applicable consumer protection law, the burden of proof is on YOUR company to demonstrate — with credible, documented evidence — that this specific defect existed before my coverage began. A general assumption or inference that the problem "must have" been developing prior to coverage is legally insufficient.

Second, the specific failure involved is as follows: ${wb || "[description of failure]"}. This failure manifested during the active coverage period. I have attached documentation showing the condition of my RV at the time coverage began, which contradicts your pre-existing condition determination.

Third, if your company conducted an inspection that identified this condition as pre-existing, I am requesting the complete inspection report, including the name and credentials of the inspector, the date of inspection, and the specific findings. If no such inspection was conducted, your denial is based on speculation and must be reversed.`,

    not_covered: `Your company has denied this claim stating that the failed component is "not covered" under my plan. I am challenging this determination for the following reasons:

First, I have reviewed my service contract in its entirety. ${d.warrantyActive === "yes" ? "My coverage is currently active." : "The failure occurred during the active coverage period."} The specific failure involved is: ${wb || "[description of failure]"}.

Second, if my contract is an exclusionary policy (which covers everything EXCEPT specifically listed exclusions), I am requesting you identify the exact exclusion, by section and page number, that applies to this component. If this component does not appear on the exclusion list, it is covered and this denial must be reversed.

Third, if my contract is a stated-component (inclusionary) policy, I am requesting you explain specifically why this component does not fall within any covered category. General or vague references to coverage categories are insufficient.

I am requesting the exact contract language — section, page number, and specific wording — that supports your determination that this component is excluded from coverage.`,

    maintenance: `Your company has denied this claim citing "lack of maintenance." I am challenging this determination for the following reasons:

First, under the Magnuson-Moss Warranty Act (15 U.S.C. §§ 2301–2312), a warranty provider CANNOT deny a claim solely because maintenance was performed by someone other than an authorized facility, or because a consumer cannot produce every maintenance record. Your company must demonstrate a direct causal connection between a specific maintenance omission and this specific failure.

Second, the specific failure involved is: ${wb || "[description of failure]"}. I am requesting your company identify exactly which maintenance task was allegedly missed, on what date it should have been performed, and specifically how that omission directly caused this particular failure. A general statement that "maintenance records are incomplete" does not establish causation.

Third, I have attached all available maintenance records for this RV. ${d.hasMaintenance !== "no" ? "These records demonstrate that I have maintained this vehicle in accordance with reasonable standards." : "While I may not have every receipt, the absence of a specific record does not prove that maintenance was not performed, and does not establish that any gap caused this failure."}`,

    unauthorized: `Your company has denied this claim stating that the repair was performed without prior authorization. I am requesting reconsideration for the following reasons:

First, the specific failure involved was: ${wb || "[description of failure]"}. The circumstances required immediate action to prevent further damage to my RV and to ensure the safety of its occupants. Delaying the repair to await authorization would have resulted in significantly greater damage and cost.

Second, I have attached the complete repair invoice, the diagnostic report from the repair facility, and photographs documenting the failure. These documents demonstrate that the repair was necessary, the charges were reasonable, and the failure falls squarely within the covered components of my service contract.

Third, I am requesting that your company evaluate this claim on its merits — specifically, whether the failed component is covered and whether the repair was necessary — rather than denying it solely on a procedural technicality. The pre-authorization requirement exists to prevent unnecessary repairs, not to avoid paying for legitimate covered failures.`,

    modification: `Your company has denied this claim stating that a modification to my RV voided coverage. I am challenging this determination based on federal law:

Under the Magnuson-Moss Warranty Act (15 U.S.C. §§ 2301–2312), a warranty provider CANNOT void coverage simply because aftermarket parts or modifications were installed. The law is clear: your company must demonstrate, with evidence, that a specific modification DIRECTLY CAUSED the specific failure being claimed. The burden of proof is on you, not on me.

The specific failure involved is: ${wb || "[description of failure]"}. I am requesting your company provide the technical evidence and causal analysis that establishes a direct link between any modification and this failure. If no such analysis has been conducted, your denial has no legal basis.

Simply noting that a modification exists, without proving it caused the failure, is a violation of the Magnuson-Moss Warranty Act and may constitute an unfair or deceptive trade practice under state consumer protection law.`,

    other: `Your company has denied this claim citing the following reason: ${d.reasonOther || "[their stated reason]"}.

I have reviewed my service contract and believe this denial is not supported by the terms of my agreement. The specific failure involved is: ${wb || "[description of failure]"}.

I am requesting your company provide the exact contract language — section, page number, and specific wording — that supports this denial. I am also requesting any inspection reports, technical analysis, or documentation that your company relied upon in making this determination.

If this documentation does not exist or does not support the denial, this claim must be reconsidered and coverage provided as outlined in my service contract.`
  };

  const enclosures = [];
  if (d.hasPhotos === "yes") enclosures.push("Photographs of failure/damage (dated)");
  enclosures.push("Copy of denial letter");
  enclosures.push("Copy of service contract");
  if (d.hasMaintenance !== "no") enclosures.push("Available maintenance records");
  enclosures.push("Repair facility invoice and/or estimate");
  enclosures.push("Repair facility diagnostic report");
  if (d.hasPriorComms) enclosures.push("Prior correspondence with warranty company");

  return `${today}

VIA CERTIFIED MAIL (Return Receipt Requested)
AND VIA EMAIL

To: ${co || "%%WARRANTY COMPANY NAME — check your denial letter or contract%%"}
Claims Department

Re: FORMAL APPEAL — Denied Warranty Claim
Policy/Contract #: ${cn}
Claim #: ${cl}${rv ? `\nRV: ${rv}` : ""}
VIN: ${vin}
Owner: ${d.name || ""}

Dear Claims Manager:

I am formally appealing the denial of Claim #${cl} dated ${dd}. After careful review of my service contract, the denial letter, and applicable federal and state consumer protection law, I believe this denial is not supported and must be reversed. The facts and law supporting my position are set forth below.

BACKGROUND:
${rv ? `My RV is a ${rv}` : "My RV"}${d.vin ? `, VIN ${d.vin}` : ""}, covered under ${d.company !== "Other / Not Sure" ? d.company : "my service contract"}, Policy/Contract #${cn}. ${wb ? `On or about the date of failure, the following occurred: ${wb}.` : ""} I reported this failure and submitted a claim, which was denied.

YOUR STATED REASON FOR DENIAL AND MY RESPONSE:

${denialArgs[d.reason] || denialArgs.other}

LEGAL AUTHORITY:

This appeal is supported by the following legal protections:

1. The Magnuson-Moss Warranty Act (15 U.S.C. §§ 2301–2312) is a federal law that governs consumer product warranties and service contracts. It requires warranty providers to honor the terms of their written agreements and prohibits unfair or deceptive denial practices. Importantly, this law provides for the recovery of attorney's fees by the consumer in the event of a successful legal action — meaning your company, not the consumer, bears the cost of litigation if this dispute proceeds to court.

2. The ${d.state || "[State]"} Consumer Protection Act and applicable state regulations prohibit unfair and deceptive trade practices, including the wrongful denial of warranty claims. A pattern of such denials may be subject to investigation by the ${d.state || "[State]"} Department of Insurance and the ${d.state || "[State]"} Attorney General.${isCali ? `\n\n3. The California Song-Beverly Consumer Warranty Act provides additional protections for California consumers, including the potential for civil penalties of up to two times actual damages for willful violations.` : ""}

WHAT I AM REQUESTING:

1. A complete reversal of this denial and full coverage of the repair under the terms of my service contract.

2. If you maintain your denial, I require a detailed written response that includes: (a) the exact contract section, page number, and language you are relying upon; (b) any inspection reports, technical findings, or expert opinions supporting your determination; and (c) a description of the internal review process applied to this claim.

PLEASE BE ADVISED:

If this appeal is not resolved to my satisfaction within 15 business days of your receipt of this letter, I intend to pursue the following actions simultaneously:

  • File a formal complaint with the ${d.state || "[State]"} Department of Insurance
  • File a complaint with the Better Business Bureau
  • File a complaint with the ${d.state || "[State]"} Attorney General, Consumer Protection Division
  • Contact the RVIA Dispute Resolution Program (DeMars & Associates, Ltd.)
  • Pursue all available legal remedies under the Magnuson-Moss Warranty Act and applicable state consumer protection laws, including the recovery of attorney's fees

I trust your company will give this matter the serious attention it requires. I expect a written response within 15 business days.

Sincerely,


${d.name || ""}
${addr}
${ph}
${em}

Enclosures:
${enclosures.map(e => `  ${e}`).join("\n")}`;
}

function genCommissionerLetter(d) {
  const today = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  const co = coName(d);
  return `${today}

${d.state || "[State]"} Department of Insurance
Consumer Complaint Division

Re: Formal Complaint Against ${co}
Policy/Contract #: ${M(d.contractNum, "CONTRACT NUMBER")}
Claim #: ${M(d.claimNum, "CLAIM NUMBER")}

Dear Commissioner:

I am filing this complaint regarding the denial of my warranty claim by ${co || "%%WARRANTY COMPANY NAME%%"}. I believe this denial is wrongful and unsupported by the terms of my service contract.

SUMMARY OF COMPLAINT:

I own a ${d.rvYear ? `${d.rvYear} ${d.rvMake || ""} ${d.rvModel || ""}`.trim() : "recreational vehicle"} covered under a service contract with ${co}, Policy/Contract #${M(d.contractNum, "CONTRACT NUMBER")}. I submitted a warranty claim (Claim #${M(d.claimNum, "CLAIM NUMBER")}) for the following failure: ${d.whatBroke || "[description of failure]"}.

The estimated repair cost is $${d.amount ? Number(d.amount).toLocaleString() : "[amount]"}.

My claim was denied on or about ${fmtDate(d.deniedDate) || "[date]"}. The reason given was: ${d.reason === "other" ? d.reasonOther : DENIAL_REASONS.find(r => r.id === d.reason)?.label || "see attached denial letter"}.

ACTIONS TAKEN:

I submitted a formal written appeal to ${co} via certified mail on ${M("", "DATE YOU MAILED APPEAL")}. As of this filing, ${co} has ${M("", "not responded / denied again / failed to provide contract language supporting denial")}.

WHY I BELIEVE THE DENIAL IS WRONGFUL:

${d.whatBroke ? `The failure — ${d.whatBroke} — ` : "The failure "}occurred during the active coverage period of my contract. I have reviewed my contract and believe the denied component falls within covered items. The warranty company has not provided the specific contract language, inspection findings, or technical evidence supporting their denial despite my written request.

REQUESTED ACTION:

I am requesting the Department investigate this complaint and require ${co} to:
1. Provide a documented, evidence-based justification for this denial, or
2. Reverse the denial and provide coverage as outlined in my service contract.

I have attached copies of my denial letter, my service contract, my formal appeal letter, and all supporting documentation.

Thank you for your attention to this matter.

Sincerely,


${d.name || ""}
${M(d.address, "YOUR ADDRESS")}
${M(d.phone, "YOUR PHONE")}
${M(d.email, "YOUR EMAIL")}

Attachments:
  Copy of warranty denial letter
  Copy of service contract
  Copy of formal appeal letter sent to ${co}
  Repair estimate/invoice
  All supporting documentation`;
}

function genBBBLetter(d) {
  const co = coName(d);
  return `Better Business Bureau Complaint

Company: ${co}

My ${d.rvYear ? `${d.rvYear} ${d.rvMake || ""} ${d.rvModel || ""}`.trim() : "RV"} experienced the following failure: ${d.whatBroke || "[description]"}.

I submitted a warranty claim (Claim #${M(d.claimNum, "CLAIM NUMBER")}, Contract #${M(d.contractNum, "CONTRACT NUMBER")}). My claim was denied on ${fmtDate(d.deniedDate) || "[date]"}. The reason given was: ${d.reason === "other" ? d.reasonOther : DENIAL_REASONS.find(r => r.id === d.reason)?.label || "[reason]"}.

The estimated repair cost is $${d.amount ? Number(d.amount).toLocaleString() : "[amount]"}.

I submitted a formal written appeal via certified mail. The company has not reversed the denial or provided the specific contract language supporting their decision.

I believe this denial is wrongful and not supported by the terms of my service contract. I have documentation including the denial letter, my contract, repair estimates, and my appeal letter.

Desired resolution: I am requesting ${co} reverse the denial and cover the repair as outlined in my service contract.

${d.name || ""}
${M(d.email, "YOUR EMAIL")}
${M(d.phone, "YOUR PHONE")}`;
}

function getSteps(d) {
  const s = d.state || "your state";
  const steps = [
    { n: 1, t: "Send Your Appeal Letter", w: "Do this today", desc: "Print it and mail it via Certified Mail with Return Receipt Requested. Also email it to the claims department. Certified mail creates a legal paper trail they cannot deny receiving.", tip: "Keep that green return receipt card when it comes back in the mail. That is your proof of delivery." },
    { n: 2, t: "Mark Your Calendar: 15 Business Days", w: "Set a reminder right now", desc: "Give them exactly 15 business days to respond in writing. If they deny again or ignore you completely, move to Step 3.", tip: "No response IS a response. Silence actually strengthens your position in the next steps." },
    { n: 3, t: "Call and Say These Exact Words", w: "Day 16 if no resolution", desc: `Call the claims department and say exactly this:\n\n"I would like to escalate this to a supervisor or your Office of the President before I file a formal complaint with the ${s} Department of Insurance and the Better Business Bureau."\n\nThat one sentence changes the entire conversation.`, tip: "Write down the full name of every person you speak with, the date, the time, and exactly what they said. Every single call." },
    { n: 4, t: "File Your Commissioner Complaint", w: "If Step 3 doesn't resolve it", desc: `File a complaint with the ${s} Department of Insurance. Use the complaint letter we generated for you. This is free. The company has 15 to 30 days to respond to the commissioner in writing, and they take it seriously because a pattern of complaints triggers regulatory audits and can threaten their license.`, tip: "This single step resolves a significant percentage of disputes. Companies settle individual claims to prevent the complaint from becoming part of a pattern." },
    { n: 5, t: "File Your BBB Complaint", w: "Same day as Step 4", desc: "File with the Better Business Bureau using the complaint we generated. Do this the same day as the commissioner complaint. Multiple simultaneous complaints create maximum pressure.", tip: "Also file with the ${s} Attorney General, Consumer Protection Division for a third layer of pressure." },
    { n: 6, t: "Contact the Free RVIA Dispute Program", w: "For manufacturer warranties only", desc: "This is a FREE mediation program run by DeMars & Associates.\n\nContact: Rylee McCoy\nPhone: 262-549-6700 ext. 1280\nEmail: info@demarsassociates.com\n\nYou speak directly with someone at the manufacturer who has settlement authority.", tip: "This only applies to manufacturer (factory) warranties, not extended service contracts. But if yours qualifies, it is powerful and completely free." }
  ];
  if (parseFloat(d.amount) <= 12500) steps.push({ n: 7, t: "Small Claims Court", w: "Your final option and a strong one", desc: `Your repair of $${d.amount ? Number(d.amount).toLocaleString() : "___"} is within small claims limits in most states. No lawyer needed. Filing fee is usually $30 to $75. Many warranty companies settle the moment they are served because sending their own lawyer to your local court costs them more than simply paying your claim.`, tip: `Search "${s} small claims court filing" for your local process and dollar limits.` });
  const isCali = d.state === "California";
  const isStrong = STRONG_LEMON.includes(d.state);
  steps.push({ n: steps.length + 1, t: "The Laws Warranty Companies Fear", w: "Know this. Use it.", desc: "The Magnuson-Moss Warranty Act is a federal law that says if a warranty company wrongfully denies your claim, they may have to pay YOUR attorney's fees on top of your repair costs. This means a consumer protection attorney may take your case at no cost to you because they collect their fees from the warranty company when you win.\n\nMention this law by name in every single communication.", tip: isCali ? "California bonus: The Song-Beverly Consumer Warranty Act gives you even stronger protections. You may be entitled to up to 2x your actual damages if the denial was willful." : isStrong ? `${d.state} has strong consumer protection laws that may give you additional remedies beyond federal law.` : "Check whether your state has additional consumer protection laws that apply to warranty disputes." });
  return steps;
}

function LetterPage({ title, text, claimNum, onBack, state, letterType }) {
  const [copied, setCopied] = useState(false);

  const doCopy = () => {
    const plain = text.replace(/%%([^%]+)%%/g, "$1");
    const ta = document.createElement("textarea");
    ta.value = plain; ta.style.cssText = "position:fixed;left:-9999px";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); setCopied(true); setTimeout(() => setCopied(false), 3000); } catch (e) {}
    document.body.removeChild(ta);
  };

  const doPrint = () => {
    const plain = text.replace(/%%([^%]+)%%/g, "______$1______");
    const cl = claimNum || "N/A";
    const w = window.open("", "_blank");
    w.document.write(`<!DOCTYPE html><html><head><title>${title}</title><style>@page{size:letter;margin:0.85in 1in;}body{font-family:"Times New Roman",serif;font-size:11.5pt;line-height:1.45;color:#000;white-space:pre-wrap;margin:0;padding:0;}@media print{.footer{position:fixed;bottom:0;left:0;right:0;text-align:center;font-size:8pt;color:#888;border-top:1px solid #ccc;padding:4px 0;}@page{@bottom-center{content:"Claim #${cl} | Page " counter(page) " of " counter(pages);font-size:8pt;}}}</style></head><body><div class="footer">Claim #${cl} | Confidential</div>${plain}</body></html>`);
    w.document.close(); w.print();
  };

  const doEmail = () => {
    const plain = text.replace(/%%([^%]+)%%/g, "$1");
    const subj = encodeURIComponent(`Formal Appeal - Claim #${claimNum || ""}`);
    const body = encodeURIComponent(plain);
    window.open(`mailto:?subject=${subj}&body=${body}`);
  };

  const renderText = () => {
    return text.split(/(%%[^%]+%%)/g).map((p, i) => {
      if (p.startsWith("%%") && p.endsWith("%%")) {
        return <span key={i} style={{ background: "#fff3cd", padding: "2px 6px", borderRadius: 3, border: "1px dashed #e8941b", fontWeight: 700, color: "#7c5a10" }}>{p.slice(2, -2)}</span>;
      }
      return <span key={i}>{p}</span>;
    });
  };

  return (
    <div style={{ background: C.cream, minHeight: "100vh", padding: "24px 16px" }}>
      <div style={{ maxWidth: 680, margin: "0 auto", fontFamily: "'Inter',-apple-system,sans-serif" }}>
        <Back onClick={onBack} label="Back to Fight Plan" />
        <h1 style={{ fontSize: 22, fontWeight: 800, color: C.navy, margin: "0 0 16px" }}>{title}</h1>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
          <button onClick={doCopy} style={{ background: copied ? C.forest : C.lNav, color: copied ? C.white : C.navy, border: `1px solid ${C.navy}`, borderRadius: 8, padding: "12px 8px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>{copied ? "Copied!" : "Copy"}</button>
          <button onClick={doPrint} style={{ background: C.navy, color: C.white, border: "none", borderRadius: 8, padding: "12px 8px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Print</button>
          <button onClick={doEmail} style={{ background: C.amber, color: C.white, border: "none", borderRadius: 8, padding: "12px 8px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Email</button>
          <button onClick={doPrint} style={{ background: C.forest, color: C.white, border: "none", borderRadius: 8, padding: "12px 8px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Save PDF</button>
        </div>
        <p style={{ fontSize: 13, color: C.mu, margin: "0 0 12px" }}>Fields highlighted in <span style={{ background: "#fff3cd", padding: "1px 6px", borderRadius: 3, border: "1px dashed #e8941b" }}>yellow</span> still need your info. Fill them in before sending.</p>
        {(letterType === "commissioner" || letterType === "bbb") && <div style={{ background: C.lFor, borderRadius: 10, padding: 14, marginBottom: 12 }}>
          {letterType === "commissioner" && state && <><p style={{ margin: "0 0 6px", fontSize: 14, fontWeight: 700, color: C.forest }}>Where to file your complaint:</p><a href={`https://www.google.com/search?q=${encodeURIComponent(state)}+department+of+insurance+file+complaint+consumer`} target="_blank" rel="noopener" style={{ fontSize: 13, color: C.navy, fontWeight: 600 }}>Search: "{state} department of insurance file complaint"</a><br/><a href={`https://www.google.com/search?q=${encodeURIComponent(state)}+attorney+general+consumer+protection+file+complaint`} target="_blank" rel="noopener" style={{ fontSize: 13, color: C.navy, fontWeight: 600, marginTop: 4, display: "inline-block" }}>Also: "{state} attorney general consumer complaint"</a></>}
          {letterType === "bbb" && <><p style={{ margin: "0 0 6px", fontSize: 14, fontWeight: 700, color: C.forest }}>Where to file your BBB complaint:</p><a href="https://www.bbb.org/file-a-complaint" target="_blank" rel="noopener" style={{ fontSize: 13, color: C.navy, fontWeight: 600 }}>Go to bbb.org/file-a-complaint</a></>}
        </div>}
        <div style={{ background: "#fff", border: "1px solid #e0e0e0", borderRadius: 10, padding: "36px 32px", fontSize: 13, fontFamily: "'Times New Roman',serif", whiteSpace: "pre-wrap", lineHeight: 1.55, color: "#222", boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
          {renderText()}
        </div>
      </div>
    </div>
  );
}

        <label style={{ display: "block", marginBottom: 14 }}><span style={{ fontSize: 13, fontWeight: 600 }}>Make</span><input style={{ ...inp, marginTop: 4 }} value={data.rvMake} onChange={e => u("rvMake", e.target.value)} placeholder="e.g. Winnebago, Thor, Grand Design" /></label>
        <label style={{ display: "block", marginBottom: 14 }}><span style={{ fontSize: 13, fontWeight: 600 }}>Model</span><input style={{ ...inp, marginTop: 4 }} value={data.rvModel} onChange={e => u("rvModel", e.target.value)} placeholder="e.g. Imagine 2800BH" /></label>
        <label style={{ display: "block", marginBottom: 0 }}><span style={{ fontSize: 13, fontWeight: 600 }}>VIN{skip}</span><input style={{ ...inp, marginTop: 4 }} value={data.vin} onChange={e => u("vin", e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 17))} placeholder="17 characters, no I O or Q" maxLength={17} />{vs && <p style={{ fontSize: 12, color: vs.ok ? C.forest : C.amber, marginTop: 4, fontWeight: 600 }}>{vs.ok ? "✓" : "⚠"} {vs.msg}</p>}</label>
      </>,
      11: <><h2 style={{ fontSize: 20, fontWeight: 700, color: C.navy, margin: "0 0 4px" }}>Contract and claim numbers</h2><p style={{ fontSize: 14, color: C.mu, margin: "0 0 16px" }}>Find these on your contract and denial letter.</p>
        <label style={{ display: "block", marginBottom: 14 }}><span style={{ fontSize: 13, fontWeight: 600 }}>Contract or policy number{skip}</span><input style={{ ...inp, marginTop: 4 }} value={data.contractNum} onChange={e => u("contractNum", e.target.value)} placeholder="e.g. RVW-123456" /></label>
        <label style={{ display: "block", marginBottom: 0 }}><span style={{ fontSize: 13, fontWeight: 600 }}>Claim number{skip}</span><input style={{ ...inp, marginTop: 4 }} value={data.claimNum} onChange={e => u("claimNum", e.target.value)} placeholder="e.g. CLM-78901" /></label>
      </>,
      12: <><h2 style={{ fontSize: 20, fontWeight: 700, color: C.navy, margin: "0 0 4px" }}>Your contact info</h2><p style={{ fontSize: 14, color: C.mu, margin: "0 0 16px" }}>Goes at the bottom of your letters.</p>
        <label style={{ display: "block", marginBottom: 14 }}><span style={{ fontSize: 13, fontWeight: 600 }}>Mailing address{skip}</span><input style={{ ...inp, marginTop: 4 }} value={data.address} onChange={e => u("address", e.target.value)} placeholder="123 Main St, City, ST 12345" /></label>
        <label style={{ display: "block", marginBottom: 14 }}><span style={{ fontSize: 13, fontWeight: 600 }}>Phone{skip}</span><input style={{ ...inp, marginTop: 4 }} value={data.phone} onChange={e => u("phone", e.target.value)} placeholder="(555) 123-4567" type="tel" /></label>
        <label style={{ display: "block", marginBottom: 0 }}><span style={{ fontSize: 13, fontWeight: 600 }}>Email{skip}</span><input style={{ ...inp, marginTop: 4 }} value={data.email} onChange={e => u("email", e.target.value)} placeholder="you@email.com" type="email" /></label>
      </>,
      13: <><h2 style={{ fontSize: 20, fontWeight: 700, color: C.navy, margin: "0 0 4px" }}>Review everything</h2><p style={{ fontSize: 14, color: C.mu, margin: "0 0 16px" }}>Make sure it all looks right. Tap "edit" to fix anything.</p>
        <div style={{ background: C.lNav, borderRadius: 12, padding: 16, fontSize: 14 }}>
          {reviewFields.map(([label, val, step], i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid #dde5ef", padding: "6px 0" }}>
              <div><span style={{ fontWeight: 700, color: C.navy }}>{label}: </span><span>{val || "—"}</span></div>
              <button onClick={() => go(setQStep,step)} style={{ background: "none", border: "none", color: C.amber, fontSize: 12, fontWeight: 700, cursor: "pointer", textDecoration: "underline" }}>edit</button>
            </div>
          ))}
        </div>
      </>
    };

    if (showFlag) return (<div style={{ background: C.cream, minHeight: "100vh", padding: "24px 16px" }}><div style={wrap}>
      <div style={card}>
        <h2 style={{ fontSize: 19, fontWeight: 800, color: C.navy, margin: "0 0 10px" }}>Before you continue</h2>
        <p style={{ fontSize: 14, margin: "0 0 12px", lineHeight: 1.6 }}>Based on what you've told us so far, this denial reason may hold up — some claims genuinely aren't covered, and we'd rather tell you that honestly than take your money for a fight you probably won't win.</p>
        <p style={{ fontSize: 14, margin: "0 0 16px", lineHeight: 1.6, color: C.mu }}>That said, you know your situation better than a few dropdown answers can capture. If there's more to it, go back and add it. Otherwise, it's your call whether to continue.</p>
        <Btn onClick={() => { setShowFlag(false); go(setQStep, qStep); }} style={{ marginBottom: 10 }}>Go Back & Add More Detail</Btn>
        <button onClick={() => { setShowFlag(false); go(setQStep, qStep + 1); }} style={{ width: "100%", background: "none", border: `1px solid ${C.navy}`, color: C.navy, borderRadius: 12, padding: "13px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Continue Anyway</button>
      </div>
    </div></div>);

    return (<div style={{ background: C.cream, minHeight: "100vh", padding: "24px 16px" }}><div style={wrap}>
      <Back onClick={() => qStep === 1 ? go(setView,"value") : go(setQStep,qStep - 1)} />
      <div style={{ height: 6, background: "#e4e4e4", borderRadius: 3, marginBottom: 6, overflow: "hidden" }}><div style={{ height: "100%", background: `linear-gradient(90deg,${C.navy},${C.amber})`, borderRadius: 3, transition: "width 0.4s", width: `${progress}%` }} /></div>
      <p style={{ fontSize: 12, color: C.mu, margin: "0 0 16px", textAlign: "right" }}>Step {qStep} of {totalQ}</p>
      <div style={card}>{Qs[qStep]}<div style={{ marginTop: 16 }}><Btn onClick={() => {
        const flagged = SCREEN_Q[data.reason] && SCREEN_Q[data.reason].options.find(o => o.v === screenChoice)?.flag;
        if (qStep === 4 && flagged && !data.moreDetails.trim()) { setShowFlag(true); return; }
        if (qStep === totalQ) return go(setView,"results");
        if (qStep === 5) return go(setView,"payment");
        go(setQStep, qStep + 1);
      }} disabled={!canNext()}>{qStep === totalQ ? "Build My Appeal & Get Me Paid!" : "Next"}</Btn></div></div>
    </div></div>);
  }

  // ──── RESULTS ────
  if (view === "results") {
    const dl = deadlineWarn(data.deniedDate);
    const steps = getSteps(data);
    const lemonFlag = parseInt(data.shopCount) >= 3;

    const printAll = () => {
      const appeal = genAppealLetter(data).replace(/%%([^%]+)%%/g, "______$1______");
      const commish = genCommissionerLetter(data).replace(/%%([^%]+)%%/g, "______$1______");
      const bbb = genBBBLetter(data).replace(/%%([^%]+)%%/g, "______$1______");
      const stepsText = steps.map(s => `STEP ${s.n}: ${s.t}\n${s.w}\n${s.desc}\nTip: ${s.tip}`).join("\n\n---\n\n");
      const cl = data.claimNum || "N/A";
      const w = window.open("", "_blank");
      w.document.write(`<!DOCTYPE html><html><head><title>RV Warranty Bust - Complete Fight Plan</title><style>@page{size:letter;margin:0.75in 1in;}body{font-family:"Times New Roman",serif;font-size:11pt;line-height:1.45;color:#000;margin:0;padding:0;}h2{font-family:Arial,sans-serif;font-size:14pt;border-bottom:2px solid #1b3a5c;padding-bottom:4px;margin-top:2em;page-break-before:always;}h2:first-of-type{page-break-before:auto;}pre{white-space:pre-wrap;font-family:"Times New Roman",serif;font-size:11pt;}.footer{font-size:8pt;color:#888;text-align:center;margin-top:3em;border-top:1px solid #ccc;padding-top:4px;}</style></head><body><h2>APPEAL LETTER</h2><pre>${appeal}</pre><h2>STATE INSURANCE COMMISSIONER COMPLAINT</h2><pre>${commish}</pre><h2>BBB COMPLAINT</h2><pre>${bbb}</pre><h2>ESCALATION PLAN</h2><pre>${stepsText}</pre><div class="footer">Claim #${cl} | RV Warranty Bust | rvwarrantybust.com | This is educational guidance, not legal advice.</div></body></html>`);
      w.document.close(); w.print();
    };

    return (<div style={{ background: C.cream, minHeight: "100vh", padding: "24px 16px" }}><div style={wrap}>
      <Back onClick={() => { go(setView,"questionnaire"); setQStep(13); }} label="Back to Review" />
      <div style={{ textAlign: "center", marginBottom: 16 }}>
        <h1 style={{ fontSize: 22, fontWeight: 800, color: C.navy, margin: "4px 0" }}>Your Fight Plan is Ready</h1>
        <p style={{ fontSize: 14, color: C.mu, margin: 0 }}>Built for {data.name} in {data.state} | {coName(data)} | Claim: {data.claimNum || "TBD"}</p>
      </div>

      <button onClick={printAll} style={{ background: C.navy, color: C.white, border: "none", borderRadius: 10, padding: "14px 24px", fontSize: 15, fontWeight: 700, cursor: "pointer", width: "100%", marginBottom: 16 }}>Print Complete Fight Plan</button>

      {dl && <div style={{ background: dl.urgent ? C.dangerBg : C.lFor, border: `1px solid ${dl.urgent ? "#fca5a5" : "#86d4a0"}`, borderRadius: 12, padding: 16, marginBottom: 16 }}><p style={{ margin: 0, fontSize: 14, fontWeight: 600, color: dl.urgent ? C.danger : C.forest }}>⏱️ {dl.text}</p></div>}

      {data.denialWritten === "no" && <div style={{ ...card, background: C.lAmb, borderLeft: `4px solid ${C.amber}` }}><h3 style={{ margin: "0 0 4px", fontSize: 15, color: C.amber }}>First thing first</h3><p style={{ margin: 0, fontSize: 14 }}>Call the warranty company and ask them to send the denial in writing with the specific contract language they're citing. You need this document before you send your appeal.</p></div>}

      {lemonFlag && <div style={{ ...card, background: C.lFor, borderLeft: `4px solid ${C.forest}` }}><h3 style={{ margin: "0 0 4px", fontSize: 15, color: C.forest }}>🍋 Lemon Law Alert</h3><p style={{ margin: 0, fontSize: 14 }}>Your RV has been in the shop {data.shopCount} times for the same issue. This may qualify under lemon law protections. Consider contacting a lemon law attorney. Many take these cases for free because the manufacturer pays their fees if you win.</p></div>}

      <div style={card}><DocCheck data={data} onChange={(k, v) => u(k, v)} /></div>

      {/* LETTER BUTTONS */}
      <div style={{ display: "grid", gap: 10, marginBottom: 20 }}>
        <button onClick={() => go(setLetterView,"appeal")} style={{ ...card, marginBottom: 0, cursor: "pointer", display: "flex", alignItems: "center", gap: 14, borderLeft: `4px solid ${C.amber}` }}>
          <span style={{ fontSize: 24 }}>📄</span>
          <div><h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: C.navy }}>Write My Appeal Letter</h3><p style={{ margin: "2px 0 0", fontSize: 13, color: C.mu }}>Your custom appeal, ready to copy, print, or email</p></div>
        </button>
        <button onClick={() => go(setLetterView,"commissioner")} style={{ ...card, marginBottom: 0, cursor: "pointer", display: "flex", alignItems: "center", gap: 14, borderLeft: `4px solid ${C.forest}` }}>
          <span style={{ fontSize: 24 }}>📋</span>
          <div><h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: C.navy }}>Write My Commissioner Complaint</h3><p style={{ margin: "2px 0 0", fontSize: 13, color: C.mu }}>Pre-filled complaint to your state's Department of Insurance</p></div>
        </button>
        <button onClick={() => go(setLetterView,"bbb")} style={{ ...card, marginBottom: 0, cursor: "pointer", display: "flex", alignItems: "center", gap: 14, borderLeft: `4px solid ${C.navy}` }}>
          <span style={{ fontSize: 24 }}>📝</span>
          <div><h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: C.navy }}>Write My BBB Complaint</h3><p style={{ margin: "2px 0 0", fontSize: 13, color: C.mu }}>Pre-filled Better Business Bureau complaint</p></div>
        </button>
      </div>

      {/* ESCALATION */}
      <div style={card}>
        <h2 style={{ fontSize: 17, fontWeight: 700, color: C.navy, margin: "0 0 16px" }}>Your Step-by-Step Escalation Plan</h2>
        <p style={{ fontSize: 14, color: C.mu, margin: "0 0 16px" }}>Follow these in order. Most denials get overturned by Step 3 or 4.</p>
        {steps.map((s, i) => <div key={i} style={{ borderLeft: `3px solid ${C.amber}`, paddingLeft: 16, marginBottom: 22 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}><span style={{ background: C.navy, color: C.white, width: 26, height: 26, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 800, flexShrink: 0 }}>{s.n}</span><h3 style={{ margin: 0, fontSize: 15, fontWeight: 700 }}>{s.t}</h3></div>
          <div style={{ fontSize: 12, color: C.amber, fontWeight: 700, margin: "4px 0 8px" }}>{s.w}</div>
          <p style={{ fontSize: 14, color: "#555", margin: "0 0 8px", whiteSpace: "pre-line" }}>{s.desc}</p>
          <div style={{ background: C.lAmb, borderRadius: 8, padding: "8px 12px", fontSize: 13, color: "#7c5a10" }}>💡 {s.tip}</div>
        </div>)}
      </div>

      {/* RULES */}
      <div style={{ ...card, background: C.lNav }}>
        <h2 style={{ fontSize: 17, fontWeight: 700, color: C.navy, margin: "0 0 12px" }}>Remember These</h2>
        {["Everything in writing. Phone calls are for pressure. Letters are for proof.", "Certified mail with return receipt. Every single time.", "Stay calm and factual. Never emotional. Never threatening.", "They changed their excuse? Good. That means their first reason was weak.", "Modifications don't automatically void your warranty. They must prove YOUR change caused THIS failure.", "Missing maintenance records doesn't kill your case. They must prove YOUR missed upkeep caused THIS specific breakdown.", "The Magnuson-Moss Warranty Act means if you win, they may pay your attorney fees. Mention it by name."].map((t, i) => <div key={i} style={{ display: "flex", gap: 10, padding: "5px 0", fontSize: 14, color: "#444" }}><span style={{ color: C.amber, fontWeight: 800, flexShrink: 0 }}>→</span><span>{t}</span></div>)}
      </div>

      <p style={{ fontSize: 11, color: "#bbb", textAlign: "center", margin: "24px auto", maxWidth: 500 }}>RV Warranty Bust helps RV owners understand and navigate the warranty dispute process. We are not attorneys and this is not legal advice. We do not guarantee outcomes. We guarantee you will have every tool to fight as hard as possible. If your situation needs legal representation, we point you to the right resources, including federal laws that may require the warranty company to cover your attorney fees.</p>
      <Btn variant="secondary" onClick={() => { go(setView,"landing"); setQStep(1); }}>Start Over</Btn>
    </div></div>);
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
